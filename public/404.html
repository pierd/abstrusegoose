<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Abstruse Goose</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Takes the current path (e.g. /about-this-mirror) and redirects to
      // /?/about-this-mirror, which index.html then converts back into the
      // original path using history.replaceState before React Router boots.
      (function () {
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            "/?/" +
            l.pathname.slice(1).replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
