<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="Description" content="Strip cartoon about math, science, and geek culture." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abstruse Goose</title>
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Converts the /?/path&query redirect produced by 404.html back into a
      // real path so React Router can handle it.
      (function () {
        var l = window.location;
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
